name: Publish Docker image

# Build the image (which bakes a fresh seed database from the public feeds) and
# push it to the GitHub Container Registry, so anyone can run the project with a
# single `docker run ghcr.io/<owner>/crypto-arena` — no clone, no build, no setup.
#
# The weekly schedule rebuilds the image so the baked market data stays current.
# Auth uses the built-in GITHUB_TOKEN (no stored secret to manage).

on:
  push:
    branches: [main]
    tags: ['stage-*', 'v*']
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC — rebuild to refresh the baked data
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
